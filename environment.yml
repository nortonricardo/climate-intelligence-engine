name: climate-engine
channels:
  - conda-forge
  - defaults
dependencies:
  # Python
  - python=3.11

  # Dados e análise
  - numpy
  - pandas
  - scipy

  # Machine Learning
  - scikit-learn
  - xgboost
  - lightgbm
  - joblib

  # Dados climáticos / geoespaciais
  - xarray
  - netcdf4
  - cfgrib
  - cartopy
  - geopandas
  - rioxarray

  # Visualização
  - matplotlib
  - seaborn
  - plotly

  # Notebooks e dev
  - jupyter
  - ipykernel
  - tqdm
  - pip

  # Pacotes pip — PyTorch (CUDA 12.6, compatível com driver 13.0) + extras
  - pip:
    - torch --index-url https://download.pytorch.org/whl/cu126
    - torchvision --index-url https://download.pytorch.org/whl/cu126
    - torchaudio --index-url https://download.pytorch.org/whl/cu126
    - transformers
    - datasets
    - evaluate
    - mlflow
    - hydra-core
    - gdown
    - weasyprint
